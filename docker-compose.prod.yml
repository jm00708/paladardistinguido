# ── El Paladar Distinguido — Entorno de producción ──────────────────────────
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  db:
    ports: !override []   # no exponer PostgreSQL en producción (!override reemplaza, no concatena)
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  redis:
    ports: !override []   # no exponer Redis en producción

  backend:
    build:
      target: production
    restart: always
    ports: !override []   # no se expone al host; el frontend lo alcanza vía red interna de Docker (backend:8000)
    volumes: !override
      - media_data:/app/media
      # !override evita que sobreviva el bind-mount de código fuente del compose base
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_PASSWORD: ${DB_PASSWORD}
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60

  celery:
    build:
      target: production
    restart: always
    volumes: !override []   # sin bind-mount de código fuente en producción
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_PASSWORD: ${DB_PASSWORD}
    command: celery -A config worker --loglevel=warning --concurrency=4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    ports: !override
      - "127.0.0.1:8082:80"   # solo para debug manual desde el VPS (curl local); el proxy real lo alcanza por la red compartida
    volumes: !override
      - media_data:/media:ro   # sirve /media/ directo, sin pasar por gunicorn
    networks:
      - default
      - plataforma_default   # permite que plataforma-nginx-1 (el reverse proxy real) lo alcance por nombre
    depends_on:
      - backend

networks:
  plataforma_default:
    external: true   # red ya creada por el stack de "plataforma"; no la administra este compose

volumes:
  postgres_data:
  media_data:
