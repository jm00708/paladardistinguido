server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sirve la SPA — todas las rutas apuntan a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend Django en producción
    # X-Forwarded-Proto se reenvia tal cual llega (no se sobreescribe con $scheme):
    # la TLS la termina el nginx del host, que es quien pone el valor real (https).
    # Si este contenedor pusiera su propio $scheme aqui, siempre seria "http"
    # (la conexion entre el nginx del host y este contenedor es interna sin TLS),
    # y Django (SECURE_SSL_REDIRECT) terminaria redirigiendo TODAS las llamadas.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Media (imágenes subidas) — servidas desde el volumen compartido con el backend
    location /media/ {
        alias /media/;
    }

    # El Service Worker (y su registrador) NUNCA debe cachearse: si el
    # navegador no vuelve a pedirlo, jamas detecta que hay una version
    # nueva del sitio. location = (match exacto) pesa mas que el ~* de
    # abajo, así que esta regla gana para estos dos archivos puntuales.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        expires off;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
        expires off;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
        expires off;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        expires off;
    }

    # Caché agresiva para assets hasheados por Vite (JS/CSS de build llevan
    # hash de contenido en el nombre — un deploy nuevo cambia el nombre).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}
